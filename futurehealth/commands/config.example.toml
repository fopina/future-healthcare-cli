# This file mirrors the CLI's command options.
#
# Click default_map-style command sections are supported:
#
# [submit]
# service = "Dentist"
#
# [login]
# username = "..."
#
# ClassyClick also supports environment overlays. Set default_env to one of the
# tables under [env.<name>] or pass --env <name> on the command line.
#
# default_env = "personal"
#
# Group-level local state paths can be configured here or passed as flags:
#
# token_path = "/path/to/token.txt"
# log_dir = "/path/to/logs"
#
# [env.personal.submit]
# person = "Alice"
#
# [env.work.submit]
# person = "Bob"
